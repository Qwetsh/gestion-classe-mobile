<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="center" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#4F46E5" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#ring)" stroke-width="24" opacity="0.2" filter="url(#softShadow)"/>

  <!-- 5 action dots (smaller) -->
  <circle cx="256" cy="96" r="22" fill="#34D399" opacity="0.9" filter="url(#glow)"/>
  <text x="256" y="103" text-anchor="middle" fill="white" font-size="18" font-weight="bold">+</text>

  <circle cx="409" cy="180" r="22" fill="#FB923C" opacity="0.9" filter="url(#glow)"/>
  <text x="409" y="187" text-anchor="middle" fill="white" font-size="18" font-weight="bold">-</text>

  <circle cx="350" cy="370" r="22" fill="#F87171" opacity="0.9" filter="url(#glow)"/>
  <text x="350" y="377" text-anchor="middle" fill="white" font-size="15" font-weight="bold">A</text>

  <circle cx="162" cy="370" r="22" fill="#60A5FA" opacity="0.9" filter="url(#glow)"/>
  <text x="162" y="377" text-anchor="middle" fill="white" font-size="15" font-weight="bold">S</text>

  <circle cx="103" cy="180" r="22" fill="#C084FC" opacity="0.9" filter="url(#glow)"/>
  <text x="103" y="187" text-anchor="middle" fill="white" font-size="15" font-weight="bold">R</text>

  <!-- Center -->
  <circle cx="256" cy="256" r="60" fill="url(#center)" filter="url(#softShadow)"/>
  <circle cx="256" cy="256" r="57" fill="white" opacity="0.12"/>

  <!-- Student silhouette -->
  <circle cx="256" cy="238" r="18" fill="white" opacity="0.9"/>
  <path d="M230 278 Q230 260 256 260 Q282 260 282 278 L282 283 Q282 288 277 288 L235 288 Q230 288 230 283 Z" fill="white" opacity="0.9"/>
</svg>
